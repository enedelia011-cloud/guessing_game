<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Leaderboard</h1>

{% if players %}
    {% for p in players %}
        <p>{{ p.name }} - {{ p.score }} tries ({{ p.difficulty }})</p>
    {% endfor %}
{% else %}
    <p>No scores yet</p>
{% endif %}

<br>

<a href="/">Back to Game</a>

</body>
</html>
